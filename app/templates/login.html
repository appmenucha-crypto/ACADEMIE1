<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - Formation VH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }
        .form-input {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }
        .form-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        <!-- Logo & Title -->
        <div class="text-center mb-10">
<div class="w-28 h-28 rounded-3xl overflow-hidden mx-auto mb-6 shadow-2xl ring-4 ring-white/50">
<img src="/media/Logo.png" alt="Logo Formation VH" class="w-full h-full object-contain">
            </div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent mb-2">
                Académie vase d'honneur
            </h1>
            <p class="text-gray-600 font-medium"></p>
        </div>

        <!-- Login Form -->
        <div class="glass-card rounded-3xl p-10">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">
                        <i class="fas fa-user me-2 text-gray-400"></i>Nom d'utilisateur
                    </label>
                    <input type="text" name="username" required class="form-input w-full px-5 py-4 rounded-2xl text-lg font-medium border focus:outline-none" placeholder="Votre nom d'utilisateur">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">
                        <i class="fas fa-lock me-2 text-gray-400"></i>Mot de passe
                    </label>
                    <input type="password" name="password" required class="form-input w-full px-5 py-4 rounded-2xl text-lg font-medium border focus:outline-none" placeholder="Votre mot de passe">
                </div>
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white py-4 px-8 rounded-2xl font-bold text-lg shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 transform">
                    <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                </button>
            </form>

            {% if login_error %}
            <div class="mt-6 p-4 bg-red-50 border border-red-200 rounded-2xl">
                <div class="flex items-center gap-3">
                    <i class="fas fa-exclamation-triangle text-red-500"></i>
                    <p class="text-sm text-red-800">Nom d'utilisateur ou mot de passe incorrect.</p>
                </div>
            </div>
            {% endif %}

          
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center text-xs text-white/70">
            <p>&copy; 2026 Formation VH. Tous droits réservés.</p>
        </div>
    </div>

    <script>
        // Animation d'apparition
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });

        // Effet focus floating label (bonus)
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentNode.style.transform = 'translateY(-2px)';
            });
            input.addEventListener('blur', function() {
                this.parentNode.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>
</html>
